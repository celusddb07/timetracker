services:
  - type: web
    name: timetracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: timetracker-db
          property: connectionString
      - key: APP_PASSWORD
        sync: false        # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false        # set manually in Render dashboard

databases:
  - name: timetracker-db
    plan: free
