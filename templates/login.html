<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Time Tracker – Log in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
<div class="d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card shadow-sm" style="width: 360px;">
    <div class="card-body p-4">
      <h4 class="mb-4 text-center">&#x23F1; Time Tracker</h4>
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" autofocus required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Enter</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
